# Coverage configuration — single source of truth for all `cargo tarpaulin`
# invocations (CI, Makefile, local). Auto-read from the repo root.
#
# `ignore-tests = true` excludes test functions from the coverage metric:
# coverage must reflect REAL (production) code being exercised, not test
# code counting itself. The 100% target therefore measures production code.
#
# NOTE: the trace engine is selected on the command line (`--engine llvm`), not
# here — tarpaulin rejects an `engine` key in this file. The source-based llvm
# engine is required because the default ptrace engine systematically
# under-attributes executed lines on this codebase (e.g. parser 473/549 vs
# llvm's 549/549) and miscounts integration-test files, so it never reaches the
# 100% gate even when every line is exercised. It needs the `llvm-tools` rustup
# component, declared in rust-toolchain.toml.
[default]
engine = "Llvm"
ignore-tests = true
out = ["Stdout", "Xml"]

# Exclude ONLY genuinely host-untestable entry/ABI boilerplate from the 100%
# metric — NOT a way to dodge testing real logic (all real logic is unit-tested
# and still counts). Globs are relative to the repo root under the `crates/`
# workspace layout.
#   * `crates/*/src/main.rs`        — CLI binary entry points (argv/stdin/
#                                     `process::exit`); each satellite's real
#                                     logic lives in its `lib.rs`, which IS
#                                     measured and tested. A `cargo test` cannot
#                                     exercise `main.rs` without spawning a
#                                     subprocess.
#   * `crates/xllm-wasm/src/lib.rs` — `#[wasm_bindgen]` export delegates; they
#                                     need a WebAssembly runtime to run. All real
#                                     logic lives in the host-unit-tested
#                                     `*_logic` functions. Mirrors the crate-local
#                                     `unsafe` exception documented in CLAUDE.md.
exclude-files = ["crates/*/src/main.rs", "crates/xllm-wasm/src/lib.rs"]
