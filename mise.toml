# mise configuration ~ https://mise.jdx.dev
#
# mise provisions the Rust toolchain, but the VERSION stays defined once in
# `rust-toolchain.toml` (the canonical file rustup, cargo and IDEs also read).
# Enabling the idiomatic-version-file setting below lets mise install Rust from
# that file, so there is a single source of truth and no drift. Node works the
# same way: its version lives in package.json's `devEngines.runtime`. Auxiliary
# tools (git-cliff, hk, etc.) are pinned explicitly in [tools] below.

[settings]
color = true
experimental = true
idiomatic_version_file = true
idiomatic_version_file_enable_tools = []
legacy_version_file = false
lockfile = true
not_found_auto_install = true
quiet = true
### Debug
#verbose = true
#log_level = "debug"

[env]
ARCH = "{{exec(command='uname -m')}}"
GITHUB_TOKEN = "{{env.GITHUB_TOKEN | default(value='')}}"
PROJECT_NAME = "{{exec(command='basename $PWD')}}"
RUST_COVERAGE_THRESHOLD = "80"
_.file = ".env"

[tools]
# rust is provisioned from rust-toolchain.toml via [settings] above — no version
# is repeated here, keeping rust-toolchain.toml the single source of truth.
actionlint = { version = "latest" }
"aqua:hk" = { version = "latest", os = [
  "linux",
  "windows",
  "macos/arm64",
], arch = [
  "arm64",
  "x64",
], locked = false }
"cargo:cargo-audit" = "latest"
"cargo:cargo-crap" = "latest"
"cargo:cargo-criterion" = "latest"
"cargo:cargo-deny" = "latest"
"cargo:cargo-edit" = "latest"
"cargo:cargo-fuzz" = "latest"
"cargo:cargo-machete" = "latest"
"cargo:cargo-mutants" = "latest"
"cargo:cargo-nextest" = "latest"
"cargo:cargo-pgo" = "latest"
"cargo:cargo-semver-checks" = "latest"
"cargo:cargo-sort" = "latest"
"cargo:cargo-tarpaulin" = "latest"
"cargo:cargo-wizard" = "latest"
"cargo:committed" = "latest"
"cargo:flamegraph" = "latest"
"cargo:hk" = { version = "latest", os = [
  "macos",
], arch = [
  "x64",
], locked = false }
"cargo:rumdl" = "latest"
"cargo:taplo-cli" = "latest"
"cargo:yamllint-rs" = "latest"
gh = { version = "latest" }
git-cliff = "latest"
"github:azolfagharj/tmq" = "latest"
gitleaks = { version = "latest" }
"pipx:codecov-cli" = "latest"
"pipx:reuse" = "latest"
taplo = "latest"

[deps.cargo]
auto = true

[deps.gh]
auto = true

[tasks.act]
description = "Run Nektos/ACT Locally"
run = '''
#!/usr/bin/env bash

set -eo pipefail

echo "Generating GitHub Token"
export GITHUB_TOKEN=$(gh auth token)
echo "GITHUB_TOKEN=$GITHUB_TOKEN" > .act/.secrets
act -W .github/workflows/tests/act.yml
unset GITHUB_TOKEN
'''

[tasks.secrets]
alias = ["sec", "act:sec"]
depends = []
depends_post = []
description = "Generate for authenticated user a GitHub Token"
run = '''
#!/usr/bin/env bash

set -eo pipefail

echo "Generating GitHub Token"
echo "GITHUB_TOKEN=$(gh auth token)" > .act/.secrets
'''
shell = "bash -c"

[tasks.setup]
alias = ["install", "dev:setup", "dev:up", "dev"]
depends = []
depends_post = []
description = "Install all mise-managed tools"
run = '''
#!/usr/bin/env bash

set -eo pipefail

export GITHUB_TOKEN=$(gh auth token)
echo "Listing mise tools..."
mise ls

echo "Installing mise tools..."
mise lock
mise install
mise deps
echo "Done, mise tools are installed/synced...."
unset GITHUB_TOKEN
'''
shell = "bash -c"

[tasks.update-actions-pins]
alias = ["update-actions", "uap"]
depends = []
depends_post = []
description = "Update SHA pins for GitHub Actions to latest release"
run = '''
#!/usr/bin/env bash

set -eo pipefail

export GITHUB_TOKEN=$(gh auth token)
echo "Updating All GitHub Actions workflows...."
python3 scripts/update-actions-pins.py "${@}"
unset GITHUB_TOKEN
'''
shell = "bash -c"

[tasks."update-actions-pins:write"]
alias = ["update-actions:write", "uapw"]
depends = []
depends_post = []
description = "Update SHA pins for GitHub Actions and write changes"
run = "mise run update-actions-pins --write"
shell = "bash -c"

[tasks."update-actions-pins:major"]
alias = ["update-actions:major", "uapm"]
depends = []
depends_post = []
description = "Update SHA pins and apply major version bumps"
run = "mise run update-actions-pins --write --apply-major"
shell = "bash -c"

[tasks.hooks-install]
description = "Install the git hooks managed by hk (global install for Git 2.54+)"
run = "hk install --global"

[tasks.doc]
alias = "d"
description = "Build the API docs (private items included, no deps) to catch broken intra-doc links"
run = "cargo doc --all-features --no-deps --document-private-items"

[tasks.lock-check]
description = "Fail if Cargo.lock is out of date relative to Cargo.toml (run `cargo update` to refresh)"
run = '''
#!/usr/bin/env bash

set -eo pipefail

# A dry-run that reports "Locking <n>" for n>=1 means the lockfile would change,
# i.e. it is stale. (Avoids `--locked`, which conflicts with `update`.)
if cargo update --workspace --dry-run 2>&1 | grep -q "Locking [1-9]"; then
    echo "Cargo.lock is out of date — run 'cargo update'." >&2
    exit 1
fi
'''
shell = "bash -c"

[tasks.yamllint]
alias = "yl"
description = "Lint YAML with yamllint-rs (Rust); pass paths (e.g. hk {staged_files}) or default to the whole repo"
run = '''
#!/usr/bin/env bash

set -eo pipefail

eval "paths=(${usage_paths:-.})"
yamllint-rs "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to lint; defaults to the whole repo when omitted"'

[tasks."yamllint:fix"]
alias = "ylf"
description = "Auto-fix fixable YAML issues with yamllint-rs (Rust)"
run = '''
#!/usr/bin/env bash

set -eo pipefail

eval "paths=(${usage_paths:-.})"
yamllint-rs --fix "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="Paths to fix; defaults to the whole repo when omitted"'

[tasks.actionlint]
alias = "al"
description = "Lint GitHub Actions workflows with actionlint (config in .github/actionlint.yaml); pass paths (e.g. hk {staged_files}) or default to all workflows"
run = '''
#!/usr/bin/env bash

set -eo pipefail

# actionlint auto-discovers .github/actionlint.yaml. With no paths it lints
# every workflow under .github/workflows; forward staged paths when given.
# Variadic args arrive shell-escaped — eval into an array so paths survive.
eval "paths=(${usage_paths:-})"
actionlint "${paths[@]}"
'''
shell = "bash -c"
usage = 'arg "[paths]" var=#true help="workflow files to lint; defaults to every workflow under .github/workflows when omitted"'

[tasks.markdownlint]
