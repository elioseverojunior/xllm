name: Release

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  package:
    name: Package crates
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30  # stable

      - name: Package crates
        run: |
          mkdir -p dist
          for c in \
            xllm \
            xllm-bitnet \
            xllm-cli \
            xllm-context \
            xllm-ggml \
            xllm-model \
            xllm-quantize \
            xllm-sampling \
            xllm-tensor \
            xllm-tokenizer \
            xllm-train; do
            cargo package -p "$c" --no-verify --allow-dirty
          done
          cp target/package/*.crate dist/ || true

      - name: Compute hashes
        id: hash
        working-directory: dist
        run: echo "hashes=$(sha256sum ./*.crate | base64 -w0)" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: crates
          path: dist/*.crate

  provenance:
    name: SLSA L3 provenance
    needs: [package]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@f7dd8c54c2067bafc12ca7a55595d5ee9b75204a  # v2.1.0
    with:
      base64-subjects: ${{ needs.package.outputs.hashes }}
      upload-assets: true

  sign:
    name: Sigstore signing
    needs: [package]
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: crates
          path: dist

      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign crates (keyless OIDC)
        run: |
          for f in dist/*.crate; do
            cosign sign-blob --yes "$f" --bundle "$f.cosign.bundle"
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: signatures
          path: dist/*.cosign.bundle
