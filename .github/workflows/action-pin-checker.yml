name: Action Pin Checker

concurrency:
  group: action-pin-checker-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

on:
  workflow_dispatch:

permissions: read-all

jobs:
  action-pins:
    name: Action SHA Pins
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Install httpx (action pins script dependency)
        run: pipx install httpx

      - name: Verify action pins are up-to-date
        run: python3 scripts/update-actions-pins.py
        env:
          GITHUB_TOKEN: ${{ github.token }}
