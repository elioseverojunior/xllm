name: CI

concurrency:
  group: ci-${{ github.ref_name }}
  cancel-in-progress: ${{ github.ref_name != github.event.repository.default_branch }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

env:
  CARGO_TERM_COLOR: always

jobs:
  quick:
    name: Format, Lint, Test
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - name: Install mold (faster linking)
        run: sudo apt-get update && sudo apt-get install -y mold

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-env

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo nextest run

      - name: Doc tests
        run: cargo test --doc --workspace

  formatting:
    name: Sort & Format
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-rust-env
        with:
          cache-target: "false"

      - name: cargo-sort check
        run: cargo sort --workspace --check --config tomlfmt.toml

      - name: taplo check
        run: taplo fmt --check --diff

  markdown:
    name: Markdown Lint
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-rust-env

      - name: Markdown lint
        run: rumdl check

  yaml:
    name: YAML & Action Lint
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: ./.github/actions/setup-rust-env
        with:
          cargo-tools: yamllint-rs
          cache-target: "false"

      - name: yamllint-rs
        run: yamllint-rs .

  secrets:
    name: Secrets Scan
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Gitleaks Setup
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: gitleaks
        run: gitleaks git --platform github .

      - name: Generate Summary Report
        if: always()
        uses: ./.github/actions/summary
        with:
          file-path: gitleaks-results.sarif
          title: "Gitleaks Scan Summary"
          tool-name: "Gitleaks"

  supply-chain:
    name: Supply Chain
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-env
        with:
          cache-target: "false"

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

      - name: REUSE lint
        run: mise run reuse

  coverage:
    name: Coverage
    runs-on: ${{ vars.RUNS_ON || 'ubuntu-latest' }}
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: recursive

      - uses: ./.github/actions/setup-rust-env

      - name: Rustup Install for doctest instrumentation
        run: rustup toolchain install --profile complete

      - name: Run coverage
        run: |
          cargo tarpaulin --workspace --engine llvm \
            --run-types Tests --run-types Doctests \
            --fail-under "${{ vars.RUST_COVERAGE_TRESHOLD || '80' }}" \
            --out Xml --out Lcov

      - name: Convert LCOV to SARIF
        if: always()
        run: cargo-crap --lcov lcov.info --format sarif > results.sarif

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-report
          path: cobertura.xml

      - name: Generate Summary Report
        if: always()
        uses: ./.github/actions/summary
        with:
          file-path: results.sarif
          title: "Coverage Report"
          tool-name: "Tarpaulin"
